<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteira</title>
    <link rel="stylesheet" href="Saldo.css">

    <!-- Font Awesome (Ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="wallet-container">
        <div class="wallet-header">
            <button onclick="voltar()" class="btn-back">← Voltar</button>
            <h2>Saldo</h2>
        </div>

        <div class="balance-card">
            <p>Saldo Disponível</p>
            <h1 id="saldo">18933,00Mz</h1>
        </div>

        <div class="actions">
            <a href="Deposito.html" class="btn-deposito">
                <i class="fas fa-money-bill-wave"></i>
                Efetuar Depósito
            </a>

            <a href="Levantamento.html" class="btn-levantamento">
                <i class="fas fa-hand-holding-dollar"></i>
                Efetuar Levantamento
            </a>
        </div>

        <div class="history">
            <h3>Atividade Recente</h3>
            <ul id="lista-transacoes">
            </ul>
        </div>
    </div>

    <script src="Saldo.js"></script>
</body>
    </html>
