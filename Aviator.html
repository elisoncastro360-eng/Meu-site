<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Aviator - LETS Bet</title>
<link rel="stylesheet" href="Aviator.css">
</head>
<body>

<div class="top-bar">
    <div class="top-title">Mini Aviator</div>
    <div class="top-balance">
        💰 <span id="balance">1000</span> MZN
    </div>
</div>

<div class="game-container">

    <canvas id="gameCanvas" width="380" height="220"></canvas>

    <div class="crash-area">
        <div id="multiplier">1.00x</div>
    </div>

    <div class="bet-area">
        <input type="number" id="betAmount" placeholder="Valor da aposta" min="1">
        <button id="betBtn">Apostar</button>
        <button id="cashoutBtn" disabled>Cash Out</button>
    </div>

    <div class="history">
        <h4>Histórico</h4>
        <div id="historyList"></div>
    </div>

</div>

<audio id="tickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-interface-hint-notification-911.wav"></audio>
<audio id="crashSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.wav"></audio>

<script src="Aviator.js"></script>
</body>
    </html>
