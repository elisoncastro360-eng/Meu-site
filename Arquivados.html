<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNB Social - Arquivados</title>
    <link rel="stylesheet" href="Arquivados.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container-arquivados">
    <header class="header-arquivados">
        <a href="Perfil.html" class="btn-voltar"><i class="fas fa-arrow-left"></i></a>
        <h1>Itens Arquivados</h1>
    </header>

    <div class="grid-arquivados" id="gridArquivados">
        </div>

    <div id="viewModal" class="view-modal" onclick="fecharVisualizacao()">
        <span class="close-view">&times;</span>
        <img id="imgExpandida" src="">
        <div class="modal-acoes">
            <button class="btn-acao restaurar" onclick="restaurarPost(event)">
                <i class="fas fa-undo"></i> Restaurar
            </button>
            <button class="btn-acao excluir" onclick="excluirDefinitivo(event)">
                <i class="fas fa-trash"></i> Excluir
            </button>
        </div>
    </div>
</div>

<script src="Arquivados.js"></script>
</body>
</html>
