<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNB Social - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark">
    <div class="login-container">
        <h1 class="logo">MNB</h1>
        <p class="subtitle">Conecte-se com o mundo.</p>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Nome de utilizador" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Palavra-passe" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="login-footer">
            <p>Não tem uma conta? <a href="../Registro/Registro.html">Registe-se</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
